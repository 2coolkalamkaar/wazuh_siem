---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: teleport
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit-read
rules:
- apiGroups: [""]
  resources:
  - namespaces
  - pods
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit-read
subjects:
- kind: ServiceAccount
  name: fluent-bit
  namespace: teleport
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: teleport
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush             1
        Log_Level         info
        Daemon            off
        Parsers_File      parsers.conf

    # --- INPUT: tail Teleport container logs only ---
    [INPUT]
        Name              tail
        Tag               kube.teleport.*
        Path              /var/log/containers/*teleport-cluster-auth*.log
        Parser            cri
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  5

    # --- FILTER: enrich with k8s metadata (pod name, namespace, container) ---
    [FILTER]
        Name                   kubernetes
        Match                  kube.teleport.*
        Kube_URL               https://kubernetes.default.svc:443
        Kube_CA_File           /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File        /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix        kube.teleport.var.log.containers.
        Merge_Log              Off
        K8S-Logging.Parser     On
        K8S-Logging.Exclude    On

    # --- FILTER: grep — only Teleport audit JSON events (lines with {"event":) ---
    [FILTER]
        Name    grep
        Match   kube.teleport.*
        Regex   log \{"event":

    [FILTER]
        Name          modify
        Match         kube.teleport.*
        Add           app_name kube.teleport

    # --- OUTPUT: forward to Wazuh Manager via syslog TCP port 514 ---
    [OUTPUT]
        Name               syslog
        Match              kube.teleport.*
        Host               wazuh-workers.wazuh.svc.cluster.local
        Port               514
        Mode               tcp
        Syslog_Format      rfc3164
        Syslog_Message_key log
        Syslog_Appname_key app_name

  parsers.conf: |
    # CRI parser strips the containerd timestamp/stream prefix
    # Input:  2024-01-01T00:00:00.000Z stdout F {"event":"user.login",...}
    # Output: log = {"event":"user.login",...}
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: teleport
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:2.1.8
          resources:
            requests:
              cpu: 50m
              memory: 50Mi
            limits:
              cpu: 200m
              memory: 200Mi
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc/
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config
